<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpNexto 1.0 - Gestão Financeira</title>
    <style>
        :root {
            --primary: #000000; --secondary: #1e3a8a; --accent: #2563eb;
            --bg: #f1f5f9; --white: #ffffff; --success: #16a34a; --danger: #dc2626;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg); color: #000; margin: 0; padding: 10px; min-height: 100vh; }

        .container { max-width: 1600px; margin: 0 auto; padding-bottom: 100px; }
        .header-logo { text-align: center; margin: 20px 0; }
        h2 { color: var(--primary); margin: 0; font-weight: 800; font-size: 2rem; }

        /* ABAS */
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
        .tab-btn { padding: 12px 25px; border: none; background: #cbd5e1; border-radius: 30px; cursor: pointer; font-weight: 600; color: #475569; transition: 0.3s; }
        .tab-btn.active { background: var(--secondary); color: white; }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--white); padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 25px; border: 1px solid #e2e8f0; }
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; color: var(--secondary); }
        input, select { padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; font-size: 0.9rem; }
        
        button.main-btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
        .btn-secondary-action { background: var(--secondary) !important; display: none; margin-top: 5px; }

        .table-container { overflow-x: auto; background: var(--white); border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { background: #f8fafc; color: var(--secondary); text-align: left; padding: 12px; font-size: 0.75rem; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-top: 1px solid #f1f5f9; font-size: 0.85rem; }

        .clickable-name { color: var(--accent); cursor: pointer; text-decoration: underline; font-weight: bold; }
        .status-btn { padding: 5px 12px; border-radius: 20px; border: none; font-size: 0.7rem; font-weight: 700; cursor: pointer; }
        .status-pago { background: #dcfce7; color: #166534; }
        .status-pendente { background: #fef9c3; color: #854d0e; }
        
        .btn-action { cursor: pointer; border: none; padding: 6px; border-radius: 5px; margin-right: 4px; }
        .btn-edit { background: rgba(37,99,235,0.1); color: var(--accent); }
        .btn-del { background: rgba(220,38,38,0.1); color: var(--danger); }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; position: relative; }
        .close-modal { background: var(--primary); color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 20px; font-weight: bold; }

        footer { text-align: center; padding: 15px; background: #fff; position: fixed; bottom: 0; width: 100%; left: 0; display: flex; justify-content: center; align-items: center; gap: 20px; border-top: 1px solid #ddd; }
        .btn-reset { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-logo"><h2>UpNexto 1.0</h2></div>

    <div class="tabs">
        <button class="tab-btn active" id="btn-vendas" onclick="navegar('vendas')">Vendas</button>
        <button class="tab-btn" id="btn-clientes" onclick="navegar('clientes')">Clientes</button>
        <button class="tab-btn" id="btn-produtos" onclick="navegar('produtos')">Produtos</button>
    </div>

    <div id="sec-vendas" class="section active">
        <div class="card">
            <input type="hidden" id="edit-id-venda">
            <div class="grid-form">
                <div class="input-group"><label>Data Pedido</label><input type="date" id="v-data"></div>
                <div class="input-group"><label>Entrega</label><input type="date" id="v-entrega"></div>
                <div class="input-group full-mobile"><label>Cliente</label><select id="v-cliente-select"><option value="">Selecione...</option></select></div>
                <div class="input-group full-mobile"><label>Produto</label><select id="v-select" onchange="autoPreencherVenda()"><option value="">Selecione...</option></select></div>
                <div class="input-group full-mobile"><label>Material/Acabamento</label><input type="text" id="v-acabamento"></div>
                <div class="input-group"><label>Qtd</label><input type="number" id="v-qtd" value="1"></div>
                <div class="input-group"><label>Vlr Unit.</label><input type="number" id="v-valorU" step="0.01"></div>
                <div class="input-group"><label>Entrada (R$)</label><input type="number" id="v-entrada" step="0.01" value="0"></div>
                <input type="hidden" id="v-custoU">
            </div>
            <button class="main-btn" id="btn-salvar-venda" onclick="registrarOuSalvarVenda()">Registrar Pedido</button>
            <button class="main-btn btn-secondary-action" id="cancel-edit-venda" onclick="limparFormVenda()">Cancelar Edição</button>
        </div>
        <div class="table-container">
            <table>
                <thead><tr><th>Datas</th><th>Cliente (Ver)</th><th>Produto</th><th>Qtd</th><th>Total</th><th>Entrada</th><th>Saldo</th><th>Fin.</th><th>Ações</th></tr></thead>
                <tbody id="listaVendas"></tbody>
            </table>
        </div>
    </div>

    <div id="sec-clientes" class="section">
        <div class="card">
            <div class="grid-form">
                <div class="input-group full-mobile"><label>Nome do Cliente</label><input type="text" id="c-nome"></div>
                <div class="input-group full-mobile"><label>Contato</label><input type="text" id="c-contato"></div>
            </div>
            <button class="main-btn" onclick="salvarCliente()" style="background:var(--secondary)">Cadastrar Cliente</button>
        </div>
        <div class="table-container" style="max-width: 800px; margin: 0 auto;">
            <table><thead><tr><th>Nome</th><th>Contato</th><th>Ações</th></tr></thead><tbody id="listaClientes"></tbody></table>
        </div>
    </div>

    <div id="sec-produtos" class="section">
        <div class="card">
            <input type="hidden" id="edit-id-produto">
            <div class="grid-form">
                <div class="input-group full-mobile"><label>Nome do Produto</label><input type="text" id="p-nome"></div>
                <div class="input-group full-mobile"><label>Material Padrão</label><input type="text" id="p-acab"></div>
                <div class="input-group"><label>Custo (R$)</label><input type="number" id="p-custo" step="0.01"></div>
                <div class="input-group"><label>Venda (R$)</label><input type="number" id="p-venda" step="0.01"></div>
            </div>
            <button class="main-btn" id="btn-salvar-produto" onclick="salvarProduto()" style="background:var(--secondary)">Cadastrar Produto</button>
            <button class="main-btn btn-secondary-action" id="cancel-edit-produto" onclick="limparFormProduto()">Cancelar Edição</button>
        </div>
        <div class="table-container" style="max-width: 900px; margin: 0 auto;">
            <table><thead><tr><th>Nome</th><th>Material</th><th>Custo</th><th>Venda</th><th>Ações</th></tr></thead><tbody id="listaCatalogo"></tbody></table>
        </div>
    </div>
</div>

<div id="viewModal" class="modal"><div class="modal-content"><div id="modalBody"></div><button class="close-modal" onclick="closeModal()">Fechar</button></div></div>

<footer><span>UpNexto 1.0 | © Gleyson Araujo</span><button class="btn-reset" onclick="limparSistema()">Resetar Sistema</button></footer>

<script>
    // --- NAVEGAÇÃO ENTRE ABAS (CORRIGIDO) ---
    function navegar(aba) {
        // Esconde todas as seções
        document.getElementById('sec-vendas').classList.remove('active');
        document.getElementById('sec-clientes').classList.remove('active');
        document.getElementById('sec-produtos').classList.remove('active');
        
        // Remove active de todos os botões
        document.getElementById('btn-vendas').classList.remove('active');
        document.getElementById('btn-clientes').classList.remove('active');
        document.getElementById('btn-produtos').classList.remove('active');

        // Ativa a aba clicada
        document.getElementById('sec-' + aba).classList.add('active');
        document.getElementById('btn-' + aba).classList.add('active');
    }

    // --- FUNÇÕES DE CLIENTE ---
    function salvarCliente() {
        const nome = document.getElementById('c-nome').value;
        const contato = document.getElementById('c-contato').value;
        if(!nome) return alert("Preencha o nome");
        let db = JSON.parse(localStorage.getItem('db_cli_v10') || "[]");
        db.push({nome, contato});
        localStorage.setItem('db_cli_v10', JSON.stringify(db));
        document.getElementById('c-nome').value = ""; document.getElementById('c-contato').value = "";
        atualizarInterface();
    }

    // --- FUNÇÕES DE PRODUTO ---
    function salvarProduto() {
        const idEd = document.getElementById('edit-id-produto').value;
        const p = { 
            id: idEd ? parseInt(idEd) : Date.now(),
            nome: document.getElementById('p-nome').value, 
            acab: document.getElementById('p-acab').value, 
            custo: parseFloat(document.getElementById('p-custo').value) || 0, 
            venda: parseFloat(document.getElementById('p-venda').value) || 0 
        };
        if(!p.nome) return alert("Digite o nome");
        let db = JSON.parse(localStorage.getItem('db_prod_v10') || "[]");
        if(idEd) {
            const idx = db.findIndex(i => i.id === parseInt(idEd));
            db[idx] = p;
        } else { db.push(p); }
        localStorage.setItem('db_prod_v10', JSON.stringify(db));
        limparFormProduto(); atualizarInterface();
    }

    function prepararEdicaoProduto(id) {
        const p = JSON.parse(localStorage.getItem('db_prod_v10')).find(i => i.id === id);
        document.getElementById('edit-id-produto').value = p.id;
        document.getElementById('p-nome').value = p.nome;
        document.getElementById('p-acab').value = p.acab;
        document.getElementById('p-custo').value = p.custo;
        document.getElementById('p-venda').value = p.venda;
        document.getElementById('btn-salvar-produto').innerText = "Salvar Alteração";
        document.getElementById('cancel-edit-produto').style.display = "block";
    }

    function limparFormProduto() {
        document.getElementById('edit-id-produto').value = "";
        document.getElementById('p-nome').value = ""; document.getElementById('p-acab').value = "";
        document.getElementById('p-custo').value = ""; document.getElementById('p-venda').value = "";
        document.getElementById('btn-salvar-produto').innerText = "Cadastrar Produto";
        document.getElementById('cancel-edit-produto').style.display = "none";
    }

    // --- FUNÇÕES DE VENDAS ---
    function autoPreencherVenda() {
        const p = JSON.parse(localStorage.getItem('db_prod_v10') || "[]").find(i => i.nome === document.getElementById('v-select').value);
        if(p) {
            document.getElementById('v-valorU').value = p.venda;
            document.getElementById('v-custoU').value = p.custo;
            document.getElementById('v-acabamento').value = p.acab;
        }
    }

    function registrarOuSalvarVenda() {
        const idEd = document.getElementById('edit-id-venda').value;
        const v = {
            id: idEd ? parseInt(idEd) : Date.now(),
            data: document.getElementById('v-data').value,
            entrega: document.getElementById('v-entrega').value,
            cliente: document.getElementById('v-cliente-select').value,
            prod: document.getElementById('v-select').value,
            acab: document.getElementById('v-acabamento').value,
            qtd: parseFloat(document.getElementById('v-qtd').value) || 1,
            vU: parseFloat(document.getElementById('v-valorU').value) || 0,
            cU: parseFloat(document.getElementById('v-custoU').value) || 0,
            entrada: parseFloat(document.getElementById('v-entrada').value) || 0,
            statusFin: "Pendente"
        };
        if(!v.cliente || !v.prod) return alert("Selecione Cliente e Produto");
        let vendas = JSON.parse(localStorage.getItem('db_vend_v10') || "[]");
        if(idEd) {
            const idx = vendas.findIndex(i => i.id === parseInt(idEd));
            v.statusFin = vendas[idx].statusFin;
            vendas[idx] = v;
        } else { vendas.unshift(v); }
        localStorage.setItem('db_vend_v10', JSON.stringify(vendas));
        limparFormVenda(); atualizarInterface();
    }

    function prepararEdicaoVenda(id) {
        const v = JSON.parse(localStorage.getItem('db_vend_v10')).find(x => x.id === id);
        document.getElementById('edit-id-venda').value = v.id;
        document.getElementById('v-data').value = v.data;
        document.getElementById('v-entrega').value = v.entrega;
        document.getElementById('v-cliente-select').value = v.cliente;
        document.getElementById('v-select').value = v.prod;
        document.getElementById('v-acabamento').value = v.acab;
        document.getElementById('v-qtd').value = v.qtd;
        document.getElementById('v-valorU').value = v.vU;
        document.getElementById('v-custoU').value = v.cU;
        document.getElementById('v-entrada').value = v.entrada;
        document.getElementById('btn-salvar-venda').innerText = "Salvar Alterações";
        document.getElementById('cancel-edit-venda').style.display = "block";
    }

    function limparFormVenda() {
        document.getElementById('edit-id-venda').value = "";
        document.getElementById('btn-salvar-venda').innerText = "Registrar Pedido";
        document.getElementById('cancel-edit-venda').style.display = "none";
        document.getElementById('v-entrada').value = "0"; document.getElementById('v-qtd').value = "1";
    }

    // --- ATUALIZAÇÃO DA INTERFACE ---
    function atualizarInterface() {
        const produtos = JSON.parse(localStorage.getItem('db_prod_v10') || "[]");
        const clientes = JSON.parse(localStorage.getItem('db_cli_v10') || "[]");
        const vendas = JSON.parse(localStorage.getItem('db_vend_v10') || "[]");

        // Preencher Selects
        document.getElementById('v-cliente-select').innerHTML = '<option value="">Selecione...</option>' + clientes.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
        document.getElementById('v-select').innerHTML = '<option value="">Selecione...</option>' + produtos.map(p => `<option value="${p.nome}">${p.nome}</option>`).join('');

        // Tabela Clientes
        document.getElementById('listaClientes').innerHTML = clientes.map((c, i) => `<tr><td><strong>${c.nome}</strong></td><td>${c.contato}</td><td><button class="btn-action btn-del" onclick="deletarItem('db_cli_v10', ${i})">✕</button></td></tr>`).join('');
        
        // Tabela Produtos
        document.getElementById('listaCatalogo').innerHTML = produtos.map((p, i) => `<tr><td><strong>${p.nome}</strong></td><td>${p.acab}</td><td>R$ ${p.custo.toFixed(2)}</td><td>R$ ${p.venda.toFixed(2)}</td><td><button class="btn-action btn-edit" onclick="prepararEdicaoProduto(${p.id})">✏️</button> <button class="btn-action btn-del" onclick="deletarItem('db_prod_v10', ${i})">🗑️</button></td></tr>`).join('');

        // Tabela Vendas
        document.getElementById('listaVendas').innerHTML = vendas.map(v => {
            const total = v.qtd * v.vU;
            const saldo = v.statusFin === "Pago" ? 0 : (total - v.entrada);
            return `<tr>
                <td style="font-size:0.75rem">${v.data.split('-').reverse().join('/')}<br><strong>E: ${v.entrega.split('-').reverse().join('/')}</strong></td>
                <td class="clickable-name" onclick="visualizarPedido(${v.id})">${v.cliente}</td>
                <td>${v.prod}</td><td>${v.qtd}</td><td>R$ ${total.toFixed(2)}</td><td style="color:var(--success)">R$ ${v.entrada.toFixed(2)}</td>
                <td style="font-weight:bold; color:${saldo > 0 ? 'var(--danger)' : 'var(--success)'}">R$ ${saldo.toFixed(2)}</td>
                <td><button onclick="toggleStatus(${v.id})" class="status-btn ${v.statusFin === 'Pago' ? 'status-pago' : 'status-pendente'}">${v.statusFin}</button></td>
                <td><button class="btn-action btn-edit" onclick="prepararEdicaoVenda(${v.id})">✏️</button> <button class="btn-action btn-del" onclick="deletarVenda(${v.id})">🗑️</button></td>
            </tr>`;
        }).join('');
    }

    function visualizarPedido(id) {
        const v = JSON.parse(localStorage.getItem('db_vend_v10')).find(x => x.id === id);
        document.getElementById('modalBody').innerHTML = `<h3>Detalhes do Pedido</h3><hr><p><strong>Cliente:</strong> ${v.cliente}</p><p><strong>Produto:</strong> ${v.prod}</p><p><strong>Quantidade:</strong> ${v.qtd}</p><p><strong>Entrada:</strong> R$ ${v.entrada.toFixed(2)}</p><p><strong>Total:</strong> R$ ${(v.qtd * v.vU).toFixed(2)}</p>`;
        document.getElementById('viewModal').style.display = 'flex';
    }

    function toggleStatus(id) {
        let vendas = JSON.parse(localStorage.getItem('db_vend_v10'));
        const v = vendas.find(x => x.id === id);
        v.statusFin = (v.statusFin === "Pago" ? "Pendente" : "Pago");
        localStorage.setItem('db_vend_v10', JSON.stringify(vendas));
        atualizarInterface();
    }

    function deletarItem(db, idx) { 
        let d = JSON.parse(localStorage.getItem(db)); d.splice(idx, 1); 
        localStorage.setItem(db, JSON.stringify(d)); atualizarInterface(); 
    }

    function deletarVenda(id) {
        if(confirm("Excluir?")) {
            let v = JSON.parse(localStorage.getItem('db_vend_v10')).filter(x => x.id !== id);
            localStorage.setItem('db_vend_v10', JSON.stringify(v)); atualizarInterface();
        }
    }

    function closeModal() { document.getElementById('viewModal').style.display = 'none'; }
    function limparSistema() { if(confirm("Apagar tudo?")) { localStorage.clear(); atualizarInterface(); } }
    
    // Início
    const hoje = new Date().toISOString().split('T')[0];
    document.getElementById('v-data').value = hoje;
    document.getElementById('v-entrega').value = hoje;
    atualizarInterface();
</script>
</body>
</html>
